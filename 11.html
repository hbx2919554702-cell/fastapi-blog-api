<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的FastAPI博客应用</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .form-group textarea { height: 100px; resize: vertical; }
        
        /* 按钮通用样式 */
        button { border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; transition: background 0.3s; color: white; }
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        
        /* 文章卡片内的按钮 */
        .card-btn { padding: 5px 10px; font-size: 14px; float: right; margin-left: 10px; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-warning { background-color: #ffc107; color: #212529; }
        .btn-warning:hover { background-color: #e0a800; }

        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .article-card { border: 1px solid #eee; padding: 15px; border-radius: 4px; margin-bottom: 15px; background-color: #fafafa; }
        .article-meta { color: #666; font-size: 0.9em; margin-bottom: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 我的博客系统</h1>

    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 30px;">
        <h2 id="formTitle">发布新文章</h2>
        <form id="postForm">
            <div class="form-group">
                <label>文章标题：</label>
                <input type="text" id="title" required placeholder="请输入标题">
            </div>
            <div class="form-group">
                <label>作者姓名：</label>
                <input type="text" id="author" placeholder="留空则默认为匿名用户">
            </div>
            <div class="form-group">
                <label>文章内容：</label>
                <textarea id="content" required placeholder="请输入正文内容..."></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" id="submitBtn" class="btn-primary" style="flex: 1;">🚀 立即发布</button>
                <button type="button" id="cancelBtn" class="btn-secondary" style="display: none;" onclick="cancelEdit()">❌ 取消编辑</button>
            </div>
        </form>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="输入关键字搜索文章..." style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <button class="btn-primary" onclick="searchArticles()">🔍 搜索</button>
        <button class="btn-secondary" onclick="fetchArticles()">🔄 全部</button>
    </div>

    <div id="articleList">
        <p style="text-align: center; color: #888;">正在加载文章...</p>
    </div>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:8000";
    let editingId = null; // 全局变量，记录当前正在编辑的文章ID。为 null 表示处于发布新文章模式。

    window.onload = () => {
        fetchArticles();
    };

    // 1. 获取文章列表 (GET)
    async function fetchArticles(keyword = "") {
        try {
            // 根据你的后端路由，如果是复数这里应该是 /articles
            let url = `${API_BASE_URL}/article?page=1&limit=100`;
            if (keyword) {
                url += `&keyword=${encodeURIComponent(keyword)}`;
            }

            const response = await fetch(url);
            if (!response.ok) throw new Error("获取失败");

            const articles = await response.json();
            renderArticles(articles);
        } catch (error) {
            console.error(error);
            document.getElementById('articleList').innerHTML = `<p style="color:red;text-align:center;">无法连接到后端，请检查后端是否运行，以及跨域(CORS)是否开启。</p>`;
        }
    }

    // 2. 表单提交 (涵盖 POST 新增 和 PUT 修改)
    document.getElementById('postForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const articleData = {
            title: document.getElementById('title').value,
            content: document.getElementById('content').value,
            author: document.getElementById('author').value || "匿名用户"
        };

        try {
            // 判断当前是新增还是编辑
            const isEditing = editingId !== null;
            const url = isEditing ? `${API_BASE_URL}/article/${editingId}` : `${API_BASE_URL}/article`;
            const method = isEditing ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(articleData)
            });

            if (response.ok) {
                alert(isEditing ? "修改成功！" : "发布成功！");
                cancelEdit(); // 提交成功后，重置表单状态
                fetchArticles(); // 刷新列表
            } else {
                alert("操作失败！请检查数据格式。");
            }
        } catch (error) {
            alert("请求失败，请检查后端是否开启！");
        }
    });

    // 3. 删除文章 (DELETE)
    async function deleteArticle(id) {
        if (!confirm("确定要删除这篇文章吗？")) return;

        try {
            const response = await fetch(`${API_BASE_URL}/article/${id}`, { method: 'DELETE' });
            if (response.ok) {
                alert("删除成功！");
                fetchArticles();
            } else {
                alert("删除失败！文章可能不存在。");
            }
        } catch (error) {
            alert("请求失败！");
        }
    }

    // 4. 进入编辑模式 (读取单篇文章数据并填充表单)
    async function startEdit(id) {
        try {
            const response = await fetch(`${API_BASE_URL}/article/${id}`);
            if (!response.ok) throw new Error("获取文章详情失败");

            const article = await response.json();

            // 填充表单
            document.getElementById('title').value = article.title;
            document.getElementById('author').value = article.author;
            document.getElementById('content').value = article.content;

            // 改变页面状态
            editingId = id;
            document.getElementById('formTitle').innerText = "✏️ 修改文章";
            document.getElementById('submitBtn').innerText = "💾 保存修改";
            document.getElementById('submitBtn').style.backgroundColor = "#28a745"; // 变成绿色提示保存
            document.getElementById('cancelBtn').style.display = "inline-block";

            // 自动滚动到页面顶部方便编辑
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
            alert("无法获取文章详情，请稍后重试。");
        }
    }

    // 5. 取消编辑状态
    function cancelEdit() {
        editingId = null;
        document.getElementById('postForm').reset();
        document.getElementById('formTitle').innerText = "发布新文章";
        document.getElementById('submitBtn').innerText = "🚀 立即发布";
        document.getElementById('submitBtn').style.backgroundColor = "#007bff";
        document.getElementById('cancelBtn').style.display = "none";
    }

    // 触发搜索
    function searchArticles() {
        const keyword = document.getElementById('searchInput').value;
        fetchArticles(keyword);
    }

    // 辅助函数：渲染文章列表
    function renderArticles(articles) {
        const listDiv = document.getElementById('articleList');
        listDiv.innerHTML = "";

        if (articles.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center;color:#666;'>暂无文章，赶快发布第一篇吧！</p>";
            return;
        }

        articles.forEach(article => {
            // 解析并格式化时间
            const createDate = article.created_at ? new Date(article.created_at).toLocaleString() : '未知时间';
            const updateDate = article.updated_at ? new Date(article.updated_at).toLocaleString() : '未修改';

            const articleDiv = document.createElement('div');
            articleDiv.className = 'article-card';
            articleDiv.innerHTML = `
                <button class="card-btn btn-danger" onclick="deleteArticle(${article.id})">删除</button>
                <button class="card-btn btn-warning" onclick="startEdit(${article.id})">编辑</button>
                <h3 style="margin-top:0;">${article.title}</h3>
                <div class="article-meta">
                    <strong>作者：</strong>${article.author} | <strong>ID:</strong> ${article.id} <br>
                    <span style="color:#888; font-size: 0.9em;">发布于：${createDate} | 最后更新：${updateDate}</span>
                </div>
                <p style="white-space: pre-wrap; line-height: 1.6; margin-bottom: 0;">${article.content}</p>
            `;
            listDiv.appendChild(articleDiv);
        });
    }
</script>

</body>
</html>
